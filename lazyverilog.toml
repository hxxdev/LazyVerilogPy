[codebase]
vcode = "tests/demo/vcode.f"

[formatter]
indent_size = 4
keyword_case = "lower"          # "lower" | "upper" | "preserve"
max_line_length = 120
wrap_spaces = 4
wrap_end_else_clauses = false
compact_indexing_and_selections = true
blank_lines_between_items = 1
default_indent_level_inside_module_block = 1
align_assign_operators = true
tab_align = true
# align_assign_gap = 20
align_port_declarations = true
port_col1_margin = 10
port_col2_margin = 10
port_col3_margin = 10
port_col4_margin = 10
align_instance_ports = true
instance_port_indent_level = 1 # indent levels for port lines relative to module instantiation
instance_port_spacing_before_paren = 10 # spaces between port name and (
instance_port_spacing_inside_paren = 10 # spaces between signal and )
align_variable_declarations = true
var_col1_margin = 10
var_col2_margin = 10
var_col3_margin = 10
var_col4_margin = 10
